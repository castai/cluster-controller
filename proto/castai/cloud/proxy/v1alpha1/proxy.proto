syntax = "proto3";
package clustertunnel.v1alpha1;
option go_package = "github.com/castai/cluster-controller/internal/tunnel/pb";

service ClusterTunnel {
  rpc Subscribe(SubscribeRequest) returns (stream HttpRequest);
  rpc SendResponse(stream HttpResponse) returns (SendResponseResult);
}

message SubscribeRequest {}
message SendResponseResult {}

message HttpRequest {
  string request_id = 1;
  string method = 2;
  string path = 3;
  repeated Header headers = 4;
  bytes body = 5;
}

message HttpResponse {
  int32 status_code = 1;
  repeated Header headers = 2;
  bytes body = 3;
}

message Header { string key = 1; string value = 2; }
