{{- if .Values.loadtestAgent.enabled }}
{{- if .Values.loadtestAgent.serviceAccount.clusterAdmin }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "castai-loadtest.fullname" . }}-cluster-admin
  labels:
    {{- include "castai-loadtest.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.loadtestAgent.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
